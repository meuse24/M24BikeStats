openapi: 3.0.3
info:
  version: 1.0.1
  title: eBike Registration API
  description: The eBike Registration API allows riders to read registrations of their bikes and components.
  contact:
    email: cloud-api.support@de.bosch.com
    name: Bosch eBike Systems Support
servers:
  - url: 'https://api.bosch-ebike.com/bike-registration/smart-system/v1'
    description: Production
paths:
  /registrations:
    get:
      tags:
        - Registrations
      summary: List all bike and component registrations
      description: Returns bike and driveUnit registrations for the requesting rider.
      operationId: get-registrations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationResponse'
              examples:
                Example 1:
                  value:
                    registrations:
                      - registrationType: BIKE_REGISTRATION
                        createdAt: '2024-01-01T01:01:01Z'
                        bikeRegistration:
                          bikeId: aee92d17-b30b-4841-aa40-c0573569b04c
                      - registrationType: COMPONENT_REGISTRATION
                        createdAt: '2024-01-01T01:01:01Z'
                        componentRegistration:
                          partNumber: EB11100001
                          serialNumber: 13923-0359-43-300-00-0000
                          componentType: DRIVE_UNIT
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '500':
          $ref: '#/components/responses/ProblemResponse'
        default:
          $ref: '#/components/responses/ProblemResponse'
      security:
        - OIDC:
            - offline_access
      servers:
        - url: 'https://api.bosch-ebike.com/bike-registration/smart-system/v1'
          description: Production
tags:
  - name: Registrations
    description: Registration listing
components:
  securitySchemes:
    OIDC:
      type: oauth2
      description: |-
        Bosch Identity & Access Management

        **Offline Access:** Client applications may use [offline_access](https://openid.net/specs/openid-connect-core-1_0.html#OfflineAccess). See the scope description below.
      flows:
        authorizationCode:
          refreshUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/token'
          authorizationUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/auth'
          scopes:
            offline_access: Use this optional scope to request a refresh token which never expires. The client application is responsible for securely persisting the token. The token never expires as long as it is used for a refresh token grant at least once every 180 days.
          tokenUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/token'
  responses:
    ProblemResponse:
      description: |
        Problem occurred, details in respective method & rest resource.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnauthorizedResponse:
      description: |
        Unauthorized
      content:
        text/plain:
          schema:
            type: string
          examples:
            access-token-expired:
              value: JWT is expired
            access-token-validation-failed:
              value: JWT verification failed
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ForbiddenResponse:
      description: |
        Forbidden
      content:
        text/plain:
          schema:
            type: string
            description: Error from Istio
          examples:
            access-denied:
              value: 'RBAC: access denied'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    RegistrationResponse:
      type: object
      title: RegistrationResponse
      properties:
        registrations:
          type: array
          items:
            type: object
            properties:
              registrationType:
                type: string
                enum:
                  - BIKE_REGISTRATION
                  - COMPONENT_REGISTRATION
                readOnly: true
              createdAt:
                type: string
                description: Timestamp when bike or component has been registered.
                format: date-time
                readOnly: true
                example: '2024-04-04T04:04:04Z'
              bikeRegistration:
                type: object
                properties:
                  bikeId:
                    type: string
                    description: Bosch unique eBike system ID.
                    format: uuid
                required:
                  - bikeId
              componentRegistration:
                type: object
                properties:
                  partNumber:
                    type: string
                    description: The part number of the component.
                    minLength: 10
                    maxLength: 13
                    example: EB11100001
                  serialNumber:
                    type: string
                    description: The serial number of the component.
                    minLength: 25
                    maxLength: 25
                    example: 13923-0359-43-300-00-0000
                  componentType:
                    type: string
                    x-extensible-enum:
                      - value: DRIVE_UNIT
                      - value: CONNECT_MODULE
                      - value: BATTERY
                required:
                  - partNumber
                  - serialNumber
                  - componentType
            required:
              - registrationType
    Problem:
      type: object
      title: Problem
      properties:
        type:
          type: string
          description: |
            A URI reference that uniquely identifies the problem type only in the context of the provided API. Opposed to the specification in RFC-7807, it is neither recommended to be dereferenceable and point to a human-readable documentation nor globally unique for the problem type.
          format: uri-reference
          default: 'about:blank'
          example: /problems/connection-error
        title:
          type: string
          description: |
            A short summary of the problem type. Written in English and readable for engineers, usually not suited for non technical stakeholders and not localized.
          example: Service Unavailable
        status:
          type: integer
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          format: int32
          minimum: 100
          maximum: 599
          example: 503
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem that is helpful to locate the problem and give advice on how to proceed. Written in English and readable for engineers, usually not suited for non technical stakeholders and not localized.
          example: Connection to database timed out
        instance:
          type: string
          description: |
            A URI reference that identifies the specific occurrence of the problem, e.g. by adding a fragment identifier or sub-path to the problem type. May be used to locate the root of this problem in the source code.
          format: uri-reference
          example: /problem/connection-error#token-info-read-timed-out
        requestId:
          type: string
          description: ID for this request.
          example: 075be661d3a4460b98dee5d66849dd5e
      required:
        - type
        - detail
        - requestId
security:
  - OIDC:
      - offline_access
