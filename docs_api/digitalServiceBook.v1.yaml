    ServiceBookStepResult:
      type: string
      enum:
        - NOT_TESTED
        - SUCCESS
        - FAILURE
        - FAILURE_USER
        - FAILURE_PRECONDITION
      description: 'The result of this step of the actuator test.  E.g., the result of a button press within the remote control button test.'
    EntryDetailsInspection:
      type: object
      description: Details for the case of an inspection entry. Null otherwise.
      properties:
        inspections:
          type: array
          description: The inspection results of the service inspection entry.
          items:
            $ref: '#/components/schemas/EntryDetailsInspectionResult'
    EntryDetailsInspectionResult:
      type: object
      description: The inspection result details for a service inspection entry.
      properties:
