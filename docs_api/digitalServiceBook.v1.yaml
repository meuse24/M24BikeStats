openapi: 3.0.3
info:
  version: 1.5.0
  title: Digital Service Book API
  description: |
    The Diagnosis Event API offers an endpoint to retrieve service records of tracked bike's maintenance.
  contact:
    email: cloud-api.support@de.bosch.com
    name: Bosch eBike Systems Support
servers:
  - url: 'https://api.bosch-ebike.com/service-book/smart-system/v1'
    description: Production
paths:
  /service-records:
    get:
      tags:
        - Digital Service Books
      summary: Get the service records of a Smart System bike.
      description: |
        Returns all available service records for the given Smart System bike that have been shared by the user with the 
        data recipient (looked up by the backend via the user's JWT). The bike is identified by its bikeId.
      operationId: getServiceRecords
      parameters:
        - $ref: '#/components/parameters/SmartSystemBikeIdFilter'
      responses:
        '200':
          description: |
            List of service records. Will return an empty list if no data available for the given bike.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRecordsResponseV1'
                __errors__:
                  '#/%24defs/ServiceBookStepResult': Keys ServiceBookStepResult_2 through ServiceBookStepResult_20 already taken.
                  '#/%24defs/ServiceBookInspectionResult': Keys ServiceBookInspectionResult_2 through ServiceBookInspectionResult_20 already taken.
        '400':
          $ref: '#/components/responses/badRequestResponseV1'
        '401':
          $ref: '#/components/responses/unauthorizedResponseV1'
        '403':
          $ref: '#/components/responses/forbiddenResponseV1'
        '429':
          $ref: '#/components/responses/rateLimitResponseV1'
        default:
          $ref: '#/components/responses/unexpectedErrorResponseV1'
      security:
        - OIDC_PROD:
            - offline_access
      servers:
        - url: 'https://api.bosch-ebike.com/service-book/smart-system/v1'
          description: Production
tags:
  - name: Digital Service Books
    description: Endpoints of Digital Service Book EUDA API for Smart System bikes
components:
  parameters:
    SmartSystemBikeIdFilter:
      name: bikeId
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/SmartSystemBikeId'
  securitySchemes:
    OIDC_PROD:
      type: oauth2
      description: |-
        Bosch Identity & Access Management for **Smart System** users

        **Offline Access:** Client applications may use [offline_access](https://openid.net/specs/openid-connect-core-1_0.html#OfflineAccess). See the scope description below.
      flows:
        authorizationCode:
          refreshUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/token'
          authorizationUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/auth'
          scopes:
            offline_access: Use this optional scope to request a refresh token which never expires. The client application is responsible for securely persisting the token. The token never expires as long as it is used for a refresh token grant at least once every 180 days.
          tokenUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/token'
  responses:
    unexpectedErrorResponseV1:
      description: |
        Unexpected error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem-1.0.0'
    badRequestResponseV1:
      description: |
        Request parameters are malformed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem-1.0.0'
    unauthorizedResponseV1:
      description: |
        Unauthorized
      content:
        text/plain:
          schema:
            type: string
          examples:
            access-token-expired:
              value: JWT is expired
            access-token-validation-failed:
              value: JWT verification failed
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem-1.0.0'
    forbiddenResponseV1:
      description: Forbidden
      content:
        text/plain:
          schema:
            type: string
          examples:
            access-denied:
              value: 'RBAC: access denied'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem-1.0.0'
    rateLimitResponseV1:
      description: Too Many Requests
      headers:
        X-RateLimit-Limit:
          schema:
            type: string
          description: 'Bucket size, refresh size and time window for refresh, in seconds'
          examples:
            __default:
              value: '100, 100;w=60'
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in current time window
          examples:
            __default:
              value: 96
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Time in seconds until bucket is refreshed
          examples:
            __default:
              value: 57
  schemas:
    ServiceRecordsResponseV1:
      type: object
      properties:
        serviceRecords:
          type: array
          items:
            $ref: '#/components/schemas/ServiceRecordSchemaV1'
      required:
        - serviceRecords
    ServiceRecordSchemaV1:
      type: object
      description: |
        A service record represents a specific service event or maintenance action performed on a bike.
        It includes details such as the type of service, the date it was performed, and any relevant attributes.
      properties:
        id:
          type: string
          description: The unique identifier of the service record.
          format: uuid
          example: 0f7ff9dc-d240-4971-b897-ebc8283cb8da
        type:
          $ref: '#/components/schemas/ServiceRecordType'
        attributes:
          $ref: '#/components/schemas/ServiceRecordAttributesV1'
      required:
        - id
        - type
        - attributes
    ServiceRecordType:
      type: string
      enum:
        - INSPECTION
        - SOFTWARE_UPDATE
        - ACTUATOR_TEST
        - CUSTOMER_REPORT
        - BIKE_ID_CHANGE
        - BBP_MEASUREMENT
      description: 'The type of service record, indicating the nature of the service performed on the bike.'
    ServiceRecordAttributesV1:
      type: object
      description: |
        Attributes of a service record.
        This object contains the details of a service record, including the bike dealer information, bike ID, odometer value, creation timestamp, and additional details.
      properties:
        bikeDealer:
          $ref: '#/components/schemas/BikeDealer'
        bikeId:
          type: string
          description: The unique identifier of the bike.
          format: uuid
        odometerValue:
          type: integer
          description: The current odometer value of the bike in meters.
          format: int64
          minimum: 0
        createdAt:
          type: string
          description: ISO 8601 compliant timestamp when the service record has been created.
          format: date-time
        details:
          $ref: '#/components/schemas/EntryDetails'
      required:
        - bikeId
        - createdAt
        - details
    BikeDealer:
      type: object
      description: |
        Bike dealer information.
        This object contains details about a bike dealer, including their name, street address, and city.
        It is used to identify the dealer associated with a bike or eBike system.
      properties:
        name:
          type: string
          description: Name of the bike dealer.
          example: La vélo de Bosch
        street:
          type: string
          description: Street address of the bike dealer.
          example: La Liberté 4711
        city:
          type: string
          description: Postcode and City of the bike dealer.
          example: 75000 Paris
      required:
        - name
    EntryDetails:
      type: object
      description: |
        The details object of a service record. Exactly one of the following properties is non-null depending on the  overall type of the entry. E.g. 'actuatorTest' is non-null if the entry type is ACTUATOR_TEST.
      properties:
        version:
          type: integer
          description: Version of the details format as single integer.
          format: int32
          example: 1
        toolVersion:
          type: string
          description: Free text describing the used version of the tool having entered the entry.
          example: bdp/3.1.9
        bike:
          $ref: '#/components/schemas/BikeInformation'
        actuatorTest:
          $ref: '#/components/schemas/EntryDetailsActuatorTest'
        inspection:
          $ref: '#/components/schemas/EntryDetailsInspection'
        softwareUpdate:
          $ref: '#/components/schemas/EntryDetailsSoftwareUpdate'
        customerReport:
          $ref: '#/components/schemas/EntryDetailsCustomerReport'
        bikeIdChange:
          $ref: '#/components/schemas/EntryDetailsBikeIdChange'
        batteryMeasurement:
          $ref: '#/components/schemas/EntryDetailsBatteryMeasurement'
      required:
        - version
    BikeInformation:
      type: object
      description: The bike information of a service record.
      properties:
        manufacturerBikeId:
          type: string
          description: The bike id defined by the bike's manufacturer.
          example: some-bike-123
        brandId:
          type: string
          description: Id of the bike's brand.
          example: BR-AN-D1
    EntryDetailsActuatorTest:
      type: object
      description: Details for the case of an actuator test entry. Null otherwise.
      properties:
        remoteControl:
          type: array
          description: The remote control actuator test steps.
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
        driveUnit:
          type: array
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
        battery1:
          type: array
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
        battery2:
          type: array
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
        headUnit:
          type: array
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
        antiLockBrakeSystem:
          type: array
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
        connectModule:
          type: array
          items:
            $ref: '#/components/schemas/EntryDetailsActuatorTestStep'
    EntryDetailsActuatorTestStep:
      type: object
      description: A single step of an actuator test.
      properties:
        testName:
          $ref: '#/components/schemas/ServiceBookTestName'
        overallResult:
