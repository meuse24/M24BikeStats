    ServiceBookInspectionResult:
      type: string
      enum:
        - NOT_CHECKED
        - CHECKED_AND_OK
        - CHECKED_AND_NOT_OK
        - CHECKED_AND_REPAIRED
      description: The result of this entry of service check list.
    EntryDetailsSoftwareUpdate:
      type: object
      description: Details for the case of a software-update entry. Null otherwise.
      properties:
        client:
          $ref: '#/components/schemas/Client'
        isForcedUpdate:
          type: boolean
          description: Whether the update was performed using the force update flag.
          default: false
        bike:
          $ref: '#/components/schemas/ServiceBookSwUpdateBike'
      required:
        - client
        - bike
    Client:
      type: object
      description: Information about the client calling the endpoint.
      properties:
        type:
          type: string
          enum:
            - BDP
            - FLOW_IOS
            - FLOW_ANDROID
          description: Type of the client.
          example: BDP
        version:
          type: string
          description: Version of the client.
          example: 1.0.3-354-g222b6197aa
      required:
        - type
        - version
    ServiceBookSwUpdateBike:
      type: object
      description: |
        This object contains the details of a bike software update, including the updated applications and components.
        It is used to report the results of a software update performed on a bike.
      properties:
        brandId:
          type: string
          description: The brand ID of the bike manufacturer.
          example: BR-AN-D1
        manufacturerBikeId:
          allOf:
            - $ref: '#/components/schemas/ManufacturerBikeId'
        bikeId:
          type: string
          description: The unique identifier of the bike.
          format: uuid
          example: 0f7ff9dc-d240-4971-b897-ebc8283cb8da
        bikeCategory:
          $ref: '#/components/schemas/BikeCategory'
        updatedApplications:
          type: object
          description: 'Contains all applications that have been updated. If an application has not been touched during the update, it is being left out (=> are optional).'
          properties:
            product:
              $ref: '#/components/schemas/ServiceBookApplicationUpdateDetails'
            gear:
              $ref: '#/components/schemas/ServiceBookApplicationUpdateDetails'
            speed:
              $ref: '#/components/schemas/ServiceBookApplicationUpdateDetails'
            assistModes:
              type: array
              description: |
                Contains all assist modes that are on the bike.
              items:
                $ref: '#/components/schemas/ServiceBookAssistModeUpdateDetails'
          required:
            - assistModes
        updatedComponents:
          type: array
          description: 'Contains all components that have been updated. If a component has not been touched during the update, it is being left out (=> are optional).'
          items:
            type: object
            properties:
              productCode:
                type: string
                description: 'The product code of the component, e.g. BDU3600.'
                example: BDU3600
              productName:
                type: string
                description: The name to be displayed to the end user.
                example: Kiox300
              partNumber:
                type: string
                description: 'The part number of the component, e.g. 0275007000.'
                example: '0275007000'
              serialNumber:
                type: string
                description: 'The serial number of the component, e.g. 33912-1234-37-300-00-0000.'
                example: 33912-1234-37-300-00-0000
              hardwareVersion:
                type: string
                description: 'The hardware version of the component, e.g. 1.0.0.'
                example: 1.0.0
              hardwareSoftwareVersion:
                type: string
                description: 'The hardware software version of the component, e.g. 1.0.0.'
                example: 1.0.0
              bootloaderVersion:
                $ref: '#/components/schemas/ServiceBookSoftwareUpdateDetails'
              softwareVersion:
                $ref: '#/components/schemas/ServiceBookSoftwareUpdateDetails'
              localizedReleaseNotes:
                type: string
                description: 'Overall release notes of component update, localized to the user''s language.'
            required:
              - productCode
              - serialNumber
              - bootloaderVersion
              - softwareVersion
      required:
        - bikeId
        - updatedComponents
    ManufacturerBikeId:
      type: string
      description: 'The manufacturer bike identifier, which is most likely the frame number.'
      maxLength: 30
      example: ABC-12345
    BikeCategory:
      type: string
      enum:
        - CITY
        - TREKKING
        - M_T_B_TOUR
        - M_T_B_TRAIL
        - ROAD
        - GRAVEL
        - KIDS
        - CARGO
        - E_CARGO_LONG_TAIL
        - FLEET
        - OTHERS
        - NOT_CONFIGURED
      description: Category of the bike.
    ServiceBookApplicationUpdateDetails:
      type: object
      properties:
        id:
          type: string
          example: P1000
        longName:
          type: string
          description: The name to be displayed to the end user.
          example: ULTRA TURBO+++
        version:
          type: object
          properties:
            old:
              type: integer
              format: int32
              example: 1
            new:
              type: integer
              format: int32
              example: 2
            localizedReleaseNotes:
              type: string
              example: Unglaubliche Performance.
      required:
        - version
    ServiceBookAssistModeUpdateDetails:
      type: object
      properties:
        id:
          type: string
          example: A1000
        longName:
          type: string
          description: The name to be displayed to the end user.
          example: ULTRA TURBO+++
        isActive:
          type: boolean
          description: Optional flag to indicate if this assist mode is among the four active assist modes that can be used while riding.
        version:
          type: object
          properties:
            old:
              type: integer
              format: int32
              example: 1
            new:
              type: integer
              format: int32
              example: 2
            localizedReleaseNotes:
              type: string
              example: Unglaubliche Performance.
      required:
        - version
    ServiceBookSoftwareUpdateDetails:
      type: object
      properties:
        old:
          type: string
          description: Optional/nullable. Version string before the update. Might be null for software version in case of FBL.
          example: 1.2.4-a
        new:
          type: string
          description: 'Optional/nullable. Version string after the update. Might be null if there is only a bootloader update, for example.'
          example: 1.2.4-b
        localizedReleaseNotes:
          type: string
          description: Optional/nullable. Release notes in the user's language.
          example: What an update!
    EntryDetailsCustomerReport:
      type: object
      description: Details for the case of a customer report entry. Null otherwise.
      properties:
        metaData:
          type: object
          properties:
            toolCreationTimestamp:
              type: string
              description: The creation time of the report in the Bosch Diagnosis Tool 3 (not server time) in ISO 8601 compliant date time format (UTC).
              format: date-time
              example: '2022-11-30T14:04:54.846354+01:00'
            toolVersion:
              type: string
              description: The version of the Bosch Diagnosis Tool 3 that has created the report.
              example: 7.8.0
            dataModelVersion:
              type: string
              description: The model of the eBike data model used for the data points in this report.
              example: 5.1.3-b
            schemaVersion:
              type: integer
              description: 'The schema version of this report. If value is not set, schema version 0 is assumed.'
              format: int32
              example: 1
        bike:
          $ref: '#/components/schemas/CustomerReportBike'
        nextServiceInformation:
          $ref: '#/components/schemas/NextServiceInformation'
    CustomerReportBike:
      type: object
      description: The bike information of a customer report.
      properties:
        bikeInformation:
          $ref: '#/components/schemas/CustomerReportBikeInformation'
        individualInformation:
          $ref: '#/components/schemas/CustomerReportBikeInformation'
        additionalInformation:
          $ref: '#/components/schemas/CustomerReportAdditionalInformation'
        supportModes:
          $ref: '#/components/schemas/CustomerReportSupportModes'
        statistics:
          $ref: '#/components/schemas/CustomerReportStatistics'
        components:
          $ref: '#/components/schemas/CustomerReportComponents'
    CustomerReportBikeInformation:
      type: object
      properties:
        datapointValues:
          type: array
          description: The data points of the bike information as part of the customer report.
          items:
            $ref: '#/components/schemas/CustomerReportDataPointValue'
    CustomerReportDataPointValue:
      type: object
      description: A single data point value of the customer report.
      properties:
        id:
          type: string
          description: Name of a datapoint as in the ebike data model.
          example: bikeId
        value:
          type: string
          description: A string representation of the raw datapoint value.
    CustomerReportAdditionalInformation:
      type: object
      properties:
        datapointValues:
          type: array
          description: The data points of the additional information as part of the customer report.
          items:
            $ref: '#/components/schemas/CustomerReportDataPointValue'
    CustomerReportSupportModes:
      type: array
      description: The support modes of the bike as part of the customer report.
      items:
        $ref: '#/components/schemas/CustomerReportSupportMode'
    CustomerReportSupportMode:
      type: object
      properties:
        isActive:
          type: boolean
          description: Whether the support mode is active or not.
        id:
          type: string
          description: The unique identifier of the support mode.
          example: ID234234
        version:
          type: integer
          description: The version of the support mode as single integer.
          format: int32
          example: 2
        shortName:
          type: string
          description: The short name of the support mode.
          example: AMA3
        longName:
          type: string
          description: The long name of the support mode.
          example: 'Assist Mode A3 [str=2]'
        application:
          type: string
          description: The application of the support mode.
          example: A000100010
        isUserAdjusted:
          type: boolean
          description: Whether the support mode is user adjusted or not.
        userDefinedAssistModeValues:
          $ref: '#/components/schemas/UserDefinedAssistModeParams'
        userDefinedAssistModeDefaults:
          $ref: '#/components/schemas/UserDefinedAssistModeParams'
        strength:
          type: integer
          description: The strength of the support mode.
          format: int32
          example: 250
    UserDefinedAssistModeParams:
      type: object
      description: |
        User-defined assist mode parameters for an e-bike. These parameters allow users to customize the behavior of the bike's motor assistance.
      properties:
        accelerationResponse:
          type: number
          description: Acceleration Response (0.0 - 1.0)
          format: float
          example: 0.55
        assistLevel:
          type: number
          description: Assist Level (0.0 - 4.0)
          format: float
          example: 1.05
        maximumBikeSpeed:
          type: integer
          description: Maximum Bike Speed (in km/h)
          format: int32
          example: 25
        maximumMotorTorque:
          type: integer
          description: Maximum Motor Torque (in Nm)
          format: int32
          example: 70
        maximumMotorPower:
          type: integer
          description: Maximum Motor Power (in W)
          format: int32
          example: 20
    CustomerReportStatistics:
      type: object
      description: The statistics of the bike as part of the customer report.
      properties:
        chartData:
          type: array
          description: Statistic data for the support modes (distance in m and energy in Wh).
          items:
            $ref: '#/components/schemas/CustomerReportSupportModeChartData'
        datapointValues:
          type: array
          description: The data points of the statistics as part of the customer report.
          items:
            $ref: '#/components/schemas/CustomerReportDataPointValue'
    CustomerReportSupportModeChartData:
      type: object
      properties:
        distanceValue:
          type: integer
          description: The total distance (in m) driven with this support mode.
          format: int32
          example: 1234
        energyValue:
          type: integer
          description: The amount of energy (in Wh) used by this support mode.
          format: int32
          example: 82
        displayName:
          type: string
          example: Assist Mode A3
        tooltipName:
          type: string
          example: A useful tooltip
    CustomerReportComponents:
      type: array
      description: The components of the bike as part of the customer report.
      items:
        $ref: '#/components/schemas/CustomerReportComponent'
    CustomerReportComponent:
      type: object
      properties:
        typeVariant:
          $ref: '#/components/schemas/ServiceBookTypeVariant'
        highestSpecialState:
          $ref: '#/components/schemas/SpecialState'
        connected:
          type: boolean
          description: Whether the component is connected and its details should be displayed
        softwareUpdateAvailable:
          type: boolean
          description: Whether there's an update available at the time of entry creation
        productName:
          type: string
          description: The name of the component to be displayed to the end user.
          example: Performance Line CX
        datapointValues:
          type: array
          description: The data points of the component as part of the customer report.
          items:
            $ref: '#/components/schemas/CustomerReportDataPointValue'
    SpecialState:
      type: string
      enum:
        - MISSING
        - RECALLED
        - MEMORY_ERROR
        - STOLEN
        - DEACTIVATED
        - ID_CONFLICT
        - LOCKED
        - OWNERSHIP_CONFLICT
        - MANIPULATED
        - UNPROGRAMMED
        - NOT_CONFIGURED
        - SAMPLE_SW
        - SAMPLE_HW
        - NOT_ACTIVATED
        - NOT_REGISTERED
        - FLIGHT_MODE
        - NONE
      description: A component can have several states. For example if the component has sample software / hardware or has been manipulated. Only the most important special state is being listed here.
    NextServiceInformation:
      type: object
      description: 'Contains information about remaining days and/or meters until next service is necessary. Properties both can be null/missing, if no values for next service are set.'
      properties:
        updatedAt:
          type: string
          description: |
            Timestamp when the next service information was last updated.
          format: date-time
        daysNextService:
          type: integer
          description: Days until next service is necessary.
          format: int64
          example: 23
        metersNextService:
          type: integer
          description: Meters until next service is necessary.
          format: int64
          example: 3145
    EntryDetailsBikeIdChange:
      type: object
      description: Details for the case of a change of bike id due to a "resolve bike id conflict" action. Null otherwise.
      properties:
        remoteControlBikeId:
          type: string
          description: The bike id stored in remote control (before conflict resolution) if drive unit was replaced. Field can be null if a new remote control was installed.
          format: uuid
        newBikeId:
          type: string
          description: The bike id of newly installed drive unit. Will be the new bike id of the remote control after the conflict resolution.
          format: uuid
        typeVariantRemoteControl:
          allOf:
            - $ref: '#/components/schemas/ServiceBookTypeVariant'
        replacedComponent:
          $ref: '#/components/schemas/ServiceBookReplacedComponent'
      required:
        - newBikeId
    ServiceBookReplacedComponent:
      type: string
      enum:
        - DRIVE_UNIT
        - REMOTE_CONTROL
      description: The component being replaced with a used component
    EntryDetailsBatteryMeasurement:
      type: object
      description: Details for the case of a battery measurement entry. Null otherwise.
      properties:
        battery:
          $ref: '#/components/schemas/ComponentInfo'
        measurement:
          type: object
          description: The battery measurement details.
          properties:
            fullChargeCycles:
              type: integer
              description: Number of full charge cycles
              format: int32
            measuredEnergyCapacity:
              type: integer
              description: The measured capacity of the battery in Wh
              format: int32
            nominalEnergyCapacity:
              type: integer
              description: The nominal capacity of the battery in Wh
              format: int32
            measuredCapacityPercentage:
              type: integer
              description: The measured capacity of the battery in % in relation to the nominal capacity
              format: int32
              minimum: 0
              maximum: 100
            onBikeMeasurement:
              type: boolean
              description: Measurement was performed while the battery was connected to the bike or not
          required:
            - fullChargeCycles
            - measuredEnergyCapacity
            - nominalEnergyCapacity
            - measuredCapacityPercentage
      required:
        - battery
        - measurement
    ComponentInfo:
      type: object
      properties:
        productCode:
          type: string
          description: Product code of the component.
          example: BBP3770
        productName:
          type: string
          description: The name to be displayed to the end user.
          example: Kiox300
        partNumber:
          type: string
          description: Part number of the component.
          example: EB1210003A
        serialNumber:
          type: string
          description: Serial number of the component.
          example: 13919-0702-01-A10-00-0000
        hardwareVersion:
          type: string
          description: Hardware version of the component.
          example: 3.1.0
        softwareVersion:
          type: string
          description: Software version of the component.
          example: 4.14.2
        bootloaderVersion:
          type: string
          description: Bootloader version of the component.
          example: 1.0.1
        hardwareSoftwareVersion:
          type: string
          description: Hardware software version of the component.
          example: 1.2.0
      required:
        - productCode
        - productName
        - partNumber
        - serialNumber
        - hardwareVersion
        - softwareVersion
    SmartSystemBikeId:
      type: string
      description: |
        The Smart System bike's globally unique ID (RFC 4122-compliant UUID) aka. Bosch System ID
      format: uuid
      example: 796c0ba5-c305-4dff-96b8-2e46237eb77e
    problem-1.0.0:
      type: object
      title: Problem
      properties:
        type:
          type: string
          description: |
            A URI reference that uniquely identifies the problem type only in the context of the provided API. Opposed to the specification in RFC-7807, it is neither recommended to be dereferenceable and point to a human-readable documentation nor globally unique for the problem type.
          format: uri-reference
          default: 'about:blank'
          example: /problems/connection-error
        title:
          type: string
          description: |
            A short summary of the problem type. Written in English and readable for engineers, usually not suited for non technical stakeholders and not localized.
          example: Service Unavailable
        status:
          type: integer
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          format: int32
          minimum: 100
          maximum: 599
          example: 503
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem that is helpful to locate the problem and give advice on how to proceed. Written in English and readable for engineers, usually not suited for non technical stakeholders and not localized.
          example: Connection to database timed out
        instance:
          type: string
          description: |
            A URI reference that identifies the specific occurrence of the problem, e.g. by adding a fragment identifier or sub-path to the problem type. May be used to locate the root of this problem in the source code.
          format: uri-reference
          example: /problems/connection-error#token-info-read-timed-out
        requestId:
          type: string
          description: ID for this request.
          example: 075be661d3a4460b98dee5d66849dd5e
      required:
        - type
        - detail
        - requestId
security:
  - OIDC_PROD:
      - offline_access
