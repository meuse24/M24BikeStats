openapi: 3.0.3
info:
  version: 1.2.0
  title: Release Management API (Smart System)
  description: |
    API for serving installation reports for the Bosch eBike smart system. 
    Installation reports are generated by every bike update of the Diagnostic Tool or Flow app attempt and contain information about the installation status, individual component information during and after the installation and error information in case of failure.
  contact:
    email: cloud-api.support@de.bosch.com
    name: Bosch eBike Systems Support
servers:
  - url: 'https://api.bosch-ebike.com/software-update'
    description: Production
paths:
  /smart-system/v1/installation-reports:
    get:
      tags:
        - Smart System Installation Reports
      summary: Get installation reports of a specified bike.
      description: Lists installation reports for a specified bike and optional time range. It returns a paginated response sorted by createdAt descending.
      operationId: getInstallationReports
      parameters:
        - name: bikeId
          in: query
          description: ID of the bike the installation reports should be retrieved for.
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          description: Maximum number of items to be returned.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
        - name: offset
          in: query
          description: Offset for pagination.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
        - name: createdAfter
          in: query
          description: Start date of the time range to filter the installation reports. Format is ISO-8601.
          required: false
          schema:
            type: string
            format: date-time
            example: '2020-01-01T00:00:00.000Z'
        - name: createdBefore
          in: query
          description: End date of the time range to filter the installation reports. Format is ISO-8601.
          required: false
          schema:
            type: string
            format: date-time
            example: '2020-01-01T00:00:00.000Z'
      responses:
        '200':
          description: Paginated list of installation reports for the specified bike. Will return an empty list if no installation reports are available.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationReportV2PaginationResponse'
        '400':
          description: The request is not valid. See details for more information.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/problem-1.0.0'
        '401':
          $ref: '#/components/responses/unauthorizedResponseV1'
        '403':
          $ref: '#/components/responses/forbiddenResponseV1'
        '429':
          $ref: '#/components/responses/rateLimitResponseV1'
        default:
          description: An unexpected error happens while execution of request.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/problem-1.0.0'
      security:
        - OIDC:
            - offline_access
      servers:
        - url: 'https://api.bosch-ebike.com/software-update'
          description: Production
tags:
  - name: Smart System Installation Reports
components:
  securitySchemes:
    OIDC:
      type: oauth2
      description: |-
        Bosch Identity & Access Management

        **Offline Access:** Client applications may use [offline_access](https://openid.net/specs/openid-connect-core-1_0.html#OfflineAccess). See the scope description below.
      flows:
        authorizationCode:
          refreshUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/token'
          authorizationUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/auth'
          scopes:
            offline_access: Use this optional scope to request a refresh token which never expires. The client application is responsible for securely persisting the token. The token never expires as long as it is used for a refresh token grant at least once every 180 days.
          tokenUrl: 'https://p9.authz.bosch.com/auth/realms/obc/protocol/openid-connect/token'
  responses:
    unauthorizedResponseV1:
      description: |
        Unauthorized
      content:
        text/plain:
          schema:
            type: string
          examples:
            access-token-expired:
              value: JWT is expired
            access-token-validation-failed:
              value: JWT verification failed
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem-1.0.0'
    forbiddenResponseV1:
      description: Forbidden
      content:
        text/plain:
          schema:
            type: string
          examples:
            access-denied:
              value: 'RBAC: access denied'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/problem-1.0.0'
    rateLimitResponseV1:
      description: Too Many Requests
      headers:
        X-RateLimit-Limit:
          schema:
            type: string
          description: 'Bucket size, refresh size and time window for refresh, in seconds'
          examples:
            __default:
              value: '100, 100;w=60'
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in current time window
          examples:
            __default:
              value: 96
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Time in seconds until bucket is refreshed
          examples:
            __default:
              value: 57
  schemas:
    InstallationReportV2PaginationResponse:
      type: object
      properties:
        installationReports:
          type: array
          items:
            $ref: '#/components/schemas/InstallationReportResponse'
        pagination:
          type: object
          properties:
            limit:
              type: integer
              format: int32
              example: 10
            offset:
              type: integer
              format: int32
              example: 0
            total:
              type: integer
              format: int32
              example: 20
          required:
            - limit
            - offset
            - total
        links:
          type: object
          description: Contains links for pagination. First and last links are only present if more than 0 installationReports are returned. Next and previous links are only present if there are more pages available.
          properties:
            self:
              type: string
              format: uri
              example: 'https://api.bosch-ebike.com/software-update/v1/smart-system/installation-reports?bikeId=953b859b-0beb-4128-aa1b-9c3dbbbd2787&limit=10&offset=0'
            first:
              type: string
              format: uri
              example: 'https://api.bosch-ebike.com/software-update/v1/smart-system/installation-reports?bikeId=953b859b-0beb-4128-aa1b-9c3dbbbd2787&limit=10&offset=0'
            prev:
              type: string
              format: uri
              example: 'https://api.bosch-ebike.com/software-update/v1/smart-system/installation-reports?bikeId=953b859b-0beb-4128-aa1b-9c3dbbbd2787&limit=10&offset=0'
            next:
              type: string
              format: uri
              example: 'https://api.bosch-ebike.com/software-update/v1/smart-system/installation-reports?bikeId=953b859b-0beb-4128-aa1b-9c3dbbbd2787&limit=10&offset=10'
            last:
              type: string
              format: uri
              example: 'https://api.bosch-ebike.com/software-update/v1/smart-system/installation-reports?bikeId=953b859b-0beb-4128-aa1b-9c3dbbbd2787&limit=10&offset=10'
          required:
            - self
      required:
        - installationReports
        - pagination
        - links
    InstallationReportResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/InstallationStatusType'
        brandId:
          type: string
          description: BrandId of the connected bike.
        bikeId:
          type: string
          description: Bosch unique eBike ID.
          format: uuid
        remoteControlBikeId:
          type: string
          description: BikeId read from the remote control.
          format: uuid
        driveUnitBikeId:
          type: string
          description: BikeId read from the drive unit.
          format: uuid
        updateSetId:
          type: string
          description: ID of the update-set which was installed.
          format: uuid
        releaseSetLastModified:
          type: string
          description: Last modified date of release set.
          format: date-time
          example: '2020-01-01T00:00:00.000Z'
        createdAt:
          type: string
          description: Timestamp when the report was created.
          format: date-time
          example: '2020-01-01T00:00:00.000Z'
        clientStatus:
          $ref: '#/components/schemas/StatusFromClient'
        updateMetrics:
          $ref: '#/components/schemas/UpdateMetrics'
        updateContext:
          $ref: '#/components/schemas/UpdateContext'
      required:
        - status
        - brandId
        - bikeId
        - updateSetId
        - releaseSetLastModified
        - createdAt
    InstallationStatusType:
      type: string
      description: Installation progress information
      example: INSTALLATION_SUCCESSFUL
      x-extensible-enum:
        - value: INSTALLATION_UNKNOWN
          description: e.g. when bike gets disconnected
        - value: INSTALLATION_SUCCESSFUL
        - value: INSTALLATION_ERROR_GENERAL
        - value: INSTALLATION_ERROR_NETWORK
          description: e.g. download error due to proxy issues
        - value: INSTALLATION_ERROR_PRECONDITIONS
          description: e.g. low battery state of charge
        - value: TRANSFER_FAILED
          description: e.g. Remote control file system corrupt
        - value: INSTALLATION_REMOTE_CONTROL_FAILED
        - value: INSTALLATION_DRIVE_UNIT_FAILED
        - value: INSTALLATION_HEAD_UNIT_FAILED
        - value: INSTALLATION_ANTI_LOCK_BREAK_SYSTEM_FAILED
        - value: INSTALLATION_BATTERY_PACK_1_FAILED
        - value: INSTALLATION_BATTERY_PACK_2_FAILED
        - value: INSTALLATION_BATTERY_PACK_3_FAILED
        - value: INSTALLATION_CONNECT_MODULE_FAILED
    StatusFromClient:
      type: object
      description: Arbitrary and optional status information from client (BDP or Flow App). Object should be NULL when no data is provided.
      properties:
        statusType:
          $ref: '#/components/schemas/ClientStatusType'
    ClientStatusType:
      type: string
      description: comprehensive enum on client status
      example: PRECONDITION_ERROR
      x-extensible-enum:
        - value: UNKNOWN
        - value: PRECONDITION_ERROR
        - value: UPDATE_ERROR
        - value: CLIENT_ERROR
    UpdateMetrics:
      type: object
      description: Data collected on the update process itself
      properties:
        clientMetrics:
          type: object
          description: Timestamps of client events
          properties:
            transferStartedAt:
              type: string
              description: Timestamp when the transfer to the remote control was started.
              format: date-time
              example: '2020-01-01T00:00:00.000Z'
            transferFinishedAt:
              type: string
              description: Timestamp when the transfer to the remote control was finished.
              format: date-time
              example: '2020-01-01T00:00:00.000Z'
            installationStartedAt:
              type: string
              description: Timestamp when the installation was started.
              format: date-time
              example: '2020-01-01T00:00:00.000Z'
            reportFinalizedAt:
              type: string
              description: Timestamp when report is ready to send to the Bosch backend.
              format: date-time
              example: '2020-01-01T00:00:00.000Z'
    UpdateContext:
      type: object
      description: Contains information on the environment and conditions in which the system update was executed
      properties:
        isforcedUpdate:
          type: boolean
          description: |
            Gives Details if the IBD updated all components, even though the UI told him.
            Information only relevant to BDP.
        updateType:
          type: string
          description: |
            Type of update that was executed.
            SYSTEM_UPDATE is used for system updates,
            BULK_CONFIG_CHANGE is used for bulk configuration changes (MassChange und PerformanceUpgrade),
            INSTALL_ASSIST_MODES is used for installing assist modes,
            REPAIR is used when repairing an eBike component.
          x-extensible-enum:
            - value: SYSTEM_UPDATE
            - value: BULK_CONFIG_CHANGE
            - value: INSTALL_ASSIST_MODES
            - value: REPAIR
        updateRepairType:
          type: string
          description: |
            Type of repair that was executed. Only relevant if updateType is REPAIR.
            PWP_RECOVERY is used when a PWP recovery is performed.
          x-extensible-enum:
            - value: PWP_RECOVERY
        bulkConfigChangeId:
          type: string
          description: |
            Identifier of the bulk configuration change that was provided by the bike manufacturer and performed along with the system software update.
          format: uuid
        clientAgent:
          $ref: '#/components/schemas/ClientAgent'
          description: Client who performs the update sequence.
        bikeProfileBeforeUpdate:
          $ref: '#/components/schemas/BikeProfile'
          description: Information of the bike profile before the update. The information comes from different component data points.
        bikeProfileAfterUpdate:
          $ref: '#/components/schemas/BikeProfile'
          description: Information of the bike profile after the update. The information comes from different component data points.
        stateOfChargeBeforeTransfer:
          $ref: '#/components/schemas/StateOfCharge'
          description: State of charge before software-update-manifest is transferred.
        stateOfChargeBeforeInstallation:
          $ref: '#/components/schemas/StateOfCharge'
          description: State of charge before software-update installation process started.
        temperatureBeforeTransfer:
          $ref: '#/components/schemas/Temperature'
          description: Temperatures of components before software-update-manifest is transferred.
        temperatureBeforeInstallation:
          $ref: '#/components/schemas/Temperature'
          description: Temperatures of components before software-update installation process started.
      required:
        - clientAgent
    ClientAgent:
      type: object
      description: Client who performs the update sequence
      properties:
        clientType:
          $ref: '#/components/schemas/ClientType'
      required:
        - clientType
    ClientType:
      type: string
      description: Type of the Client which send the installation report.
      example: BDP
      x-extensible-enum:
        - value: BDP
        - value: FLOW_APP
    BikeProfile:
      type: object
      properties:
        applications:
          $ref: '#/components/schemas/Applications'
        components:
          $ref: '#/components/schemas/Components'
        thirdPartyComponents:
          $ref: '#/components/schemas/ThirdPartyComponents'
    Applications:
      type: object
      description: 'Applications/configurations installed on the bike for gearshift, speedRegion, product (main-application) or assistModes.'
      properties:
        gearshift:
          $ref: '#/components/schemas/Application'
        product:
          $ref: '#/components/schemas/Application'
        speedRegion:
          $ref: '#/components/schemas/Application'
        assistModes:
          type: array
          description: A union of required and available assist modes
          items:
            $ref: '#/components/schemas/Application'
    Application:
      type: object
      description: An application installed on the bike
      properties:
        id:
          type: string
          description: Id of the application
          example: X000000010
        version:
          type: string
          description: Version of the application
          example: '1'
    Components:
      type: array
      description: Collected for each component installed on the bike. Each property is available at every component
      items:
        type: object
        properties:
          bootloaderVersion:
            type: string
            description: The software version of the bootloader running on the component during this boot
            example: 1.0.0
          hardwareSoftwareVersion:
            type: string
            description: The hardware software version of the component
            example: '1.0'
          hardwareVersion:
            type: string
            description: The hardware version of the component
            example: '1.0'
          partNumber:
            type: string
            description: The part number of the component
            example: EB1310000E
          productCode:
            type: string
            description: The product code of the component
            example: BDU3600
          serialNumber:
            type: string
            description: The serial number of the component
            example: 12345-1234-12-123-12-1234
          softwareVersion:
            type: string
            description: The software version of the software running on the component
            example: 1.0.0
      example:
        - bootloaderVersion: 1.0.0
          hardwareSoftwareVersion: '1.0'
          hardwareVersion: '1.0'
          partNumber: EB1310000E
          productCode: BDU3600
          serialNumber: 12345-1234-12-123-12-1234
          softwareVersion: 1.0.0
    ThirdPartyComponents:
      type: array
      description: 'Includes information on all components in the bike, which are not managed by the remote control in the update process.'
      items:
        type: object
        properties:
          componentName:
            type: string
            description: name of the component
            example: eShift
          manufacturerName:
            type: string
            description: name of the manufacturer
            example: TEKTRO
          serialNumber:
            type: string
            description: serial number of the component
            example: T&B_RD 1234567890
          hardwareVersion:
            type: string
            description: hardware version of the component
            example: '1.0'
          softwareVersion:
            type: string
            description: software version of the component
            example: 1.0.0
    StateOfCharge:
      type: object
      properties:
        remoteControl:
          type: integer
          description: Internal battery voltage in V. Accuracy of measurement is 20 mV.
          format: int32
        connectModule:
          type: integer
          description: Battery voltage of connectModule internal battery. Value is in milli-Volt.
          format: int32
    Temperature:
      type: object
      description: Temperature information of the bike components
      properties:
        remoteControlBattery:
          type: number
          description: Internal battery temperature in K. Accuracy of measurement is 7.2 K (in the range of -15°C – 60°C).
          format: float
          example: 303.15
        remoteControlPcb:
          type: number
          description: PCB (printed circuit board) temperature in K. Accuracy of measurement is 7.7 K (in the range of -20°C – 70°C).
          format: float
          example: 303.15
        batteryPack1Fet:
          type: number
          description: The battery FET (field-effect-transistor) temperature information. Resolution 0.1° C.
          format: float
          example: 0.1
        batteryPack1:
          type: number
          description: The battery pack temperature information. Resolution 0.1° C.
          format: float
          example: 0.1
        batteryPack2Fet:
          type: number
          description: The battery FET (field-effect-transistor) temperature information. Resolution 0.1° C.
          format: float
          example: 0.1
        batteryPack2:
          type: number
          description: The battery pack temperature information. Resolution 0.1° C.
          format: float
          example: 0.1
        driveUnitPcb:
          type: number
          description: The drive unit PCB (printed circuit board) temperature information. Resolution 0.1 °C.
          format: float
          example: 0.1
    problem-1.0.0:
      type: object
      title: Problem
      properties:
        type:
          type: string
          description: |
            A URI reference that uniquely identifies the problem type only in the context of the provided API. Opposed to the specification in RFC-7807, it is neither recommended to be dereferenceable and point to a human-readable documentation nor globally unique for the problem type.
          format: uri-reference
          default: 'about:blank'
          example: /problems/connection-error
        title:
          type: string
          description: |
            A short summary of the problem type. Written in English and readable for engineers, usually not suited for non technical stakeholders and not localized.
          example: Service Unavailable
        status:
          type: integer
          description: |
            The HTTP status code generated by the origin server for this occurrence of the problem.
          format: int32
          minimum: 100
          maximum: 599
          example: 503
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the problem that is helpful to locate the problem and give advice on how to proceed. Written in English and readable for engineers, usually not suited for non technical stakeholders and not localized.
          example: Connection to database timed out
        instance:
          type: string
          description: |
            A URI reference that identifies the specific occurrence of the problem, e.g. by adding a fragment identifier or sub-path to the problem type. May be used to locate the root of this problem in the source code.
          format: uri-reference
          example: /problems/connection-error#token-info-read-timed-out
        requestId:
          type: string
          description: ID for this request.
          example: 075be661d3a4460b98dee5d66849dd5e
      required:
        - type
        - detail
        - requestId
security:
  - OIDC:
      - offline_access
